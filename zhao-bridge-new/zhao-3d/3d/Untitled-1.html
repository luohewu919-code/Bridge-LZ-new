<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>赵州桥3D模型及交互</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;}
canvas{display:block;}

#floatTip{
  position:absolute;
  background:rgba(0,0,0,0.85);
  color:#fff;
  padding:12px;
  border-radius:8px;
  z-index:100;
  display:none;
  pointer-events:none;
  transform:translate(-50%,-100%);
  display:flex;
  gap:12px;
  align-items:flex-start;
}
#floatTip .tip-img{
  width:120px;
  height:auto;
  border-radius:4px;
  object-fit:cover;
}
#floatTip .tip-text{
  min-width:160px;
}
#floatTip .tip-text h4{
  margin:0 0 8px;
  font-size:16px;
}
#floatTip .tip-text p{
  margin:4px 0;
  font-size:14px;
}

/* ========== 传送带动画 1:1还原 ========== */
.loader-container{
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #2f3542;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
}
.loader-container.hide{
    opacity: 0;
    pointer-events: none;
}
.loader{
    width: 100px;
    position: relative;
}
.loader div{
    width: 30px;
    height: 30px;
    background-color: #0abde3;
    position: absolute;
    left: calc(var(--i) * 30px);
    animation: move 2s linear infinite;
    animation-delay: calc(var(--i) * -400ms);
}
@keyframes move {
    0%{
        left: 150px;
        top: 0;
    }
    80%{
        left: 0;
        top: 0;
    }
    85%{
        left: 0;
        top: -30px;
        width: 30px;
        height: 30px;
    }
    88%{
        left: 0;
        top: -30px;
    }
    90%{
        width: 60px;
        height: 25px;
    }
    95%{
        left: 150px;
        top: -30px;
        width: 30px;
        height: 30px;
    }
    98%{
        left: 150px;
        top: -30px;
    }
    100%{
        left: 150px;
        top: 0;
    }
}
</style>
</head>
<body>

<!-- 你原版的加载动画 -->
<div class="loader-container" id="loaderWrap">
  <div class="loader">
    <div style="--i:0;"></div>
    <div style="--i:1;"></div>
    <div style="--i:2;"></div>
    <div style="--i:3;"></div>
    <div style="--i:4;"></div>
  </div>
</div>

<div id="floatTip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

let scene,camera,renderer;
let starParticles;
const moveSpeed = 0.15;
const mouseSensitivity = 0.004;
let keyMap = {};

let yaw = 0;
let pitch = 0;
const pitchLimit = Math.PI / 2.2;

let isLook = false;
let lastMouseX = 0;
let lastMouseY = 0;

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const floatTip = document.getElementById('floatTip');
let clickableObjects = [];
let curShowObj = null;

let markers = [];
const loaderWrap = document.getElementById('loaderWrap');

function hideLoader(){
  loaderWrap.classList.add('hide');
}

// 核心修复：等页面完全加载后，再初始化3D，动画绝不卡
window.addEventListener('load', () => {
  setTimeout(init, 100);
});

function init(){
scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000);
camera.position.set(0,5,12);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const ambLight = new THREE.AmbientLight(0xffffff,1.2);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff,1);
dirLight.position.set(50,100,50);
scene.add(dirLight);

createStarParticles();

createClickableMarker(-0.24965, -1.8833, -2.8277, {
  name: "蚣蝮（吸水兽）",
  介绍: "是中国古代神话中龙生九子之一，性喜水，常被雕刻在桥洞两侧，有镇水、防洪的寓意。",
  img: "1.jpg"
});
createClickableMarker(1.2997, -1.9306, 0.3431, {
  name: "蚣蝮（吸水兽）",
  介绍: "是中国古代神话中龙生九子之一，性喜水，常被雕刻在桥洞两侧，有镇水、防洪的寓意。",
  img: "1.jpg"
});
createClickableMarker(-5.605, -3.5575, 1.676, {
  name: "敞肩小拱",
  介绍: "两侧各设两个小拱,减轻自重700吨,增加泄洪面积16%,四个小拱对称布置在大拱两侧,每个直径约3米。小拱作用,1.减轻桥身自重约700吨 2.增加泄洪面积约16% 3.节约石材约180立方米 这种空腹式拱桥设计,比欧洲早了700余年,是赵州桥的核心创新。",
  img: "敞肩小拱.png"
});
createClickableMarker(0.37436, -2.2171, -1.7657, {
  name: "主拱结构",
  介绍: "单孔敞肩圆弧拱;跨径37.02米,矢跨比约1:5,28道纵向并列砌筑主拱数据:\n跨径:37.02米\n拱高:7.23米\n矢跨比:约1:5\n拱券:28道纵向并列\n主拱采用“纵向并列砌筑法”建造,这种工艺使每道拱券可以独立承重,即使部分损坏也不会影响整体结构。",
  img: "主拱结构.png"
});
createClickableMarker(-1.4572, -1.9932, 1.7086, {
  name: "铁件榫卯",
  介绍: "腰铁横向连接，铁拉杆纵向贯穿，将28道拱券紧紧束为一体。腰铁：横向连接拱石，增加整体性；铁拉杆：纵向贯穿28道拱券。这种金属-石材复合结构，领先欧洲700年。",
  img: "铁件榫卯.png"
});
createClickableMarker(-7.2304, -1.9726, 4.6122, {
  name: "桥头石狮",
  介绍: "赵州桥两侧的石狮雕刻形态各异，有的蹲踞，有的回首，造型生动，展现了隋唐石雕艺术的雄浑大气。这些石狮既是装饰构件，也是桥梁的重要组成部分，体现了功能与艺术的完美结合。",
  img: "桥头石狮.png"
});
createClickableMarker(-2.5363, -1.7296, 2.1664, {
  name: "望柱雕饰",
  介绍: "望柱是栏板的支撑构件，赵州桥的望柱头雕刻有莲瓣、石榴等多种造型，线条流畅，比例协调。这些细节装饰体现了古代工匠对完美的追求，每一个构件都经过精心设计。",
  img: "望柱雕饰.png"
});
createClickableMarker(-0.018984, -1.3697, 0.97978, {
  name: "龙兽浮雕",
  介绍: "明代修缮时仿照原貌雕刻的龙兽图案，延续了隋唐石雕艺术的风格，同时又有所创新。这些浮雕作品既保护了桥梁结构，又增添了艺术气息，使赵州桥成为一座露天的石雕博物馆。",
  img: "龙兽.jpeg"
});
createClickableMarker(0.90266, -1.5581, 0.48253, {
  name: "蛟龙穿岩栏板",
  介绍: "赵州桥两侧栏板雕刻“蛟龙穿岩”，龙身穿过岩层，呈现强烈的透视感与动态美。据研究，这些栏板雕刻属于隋代原物，是研究隋唐石雕艺术的珍贵实物资料，被专家认定为隋唐石雕孤品。",
  img: "蛟龙穿岩栏板.png"
});

// 延迟加载模型，保证动画流畅
setTimeout(loadObjWithMtl, 300);

window.addEventListener('keydown',e=>keyMap[e.key.toLowerCase()]=true);
window.addEventListener('keyup',e=>keyMap[e.key.toLowerCase()]=false);
renderer.domElement.addEventListener('mousedown',e=>{
  isLook = true;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});
window.addEventListener('mouseup',()=>isLook=false);
window.addEventListener('mousemove',e=>{
  if(!isLook) return;
  const dx = e.clientX - lastMouseX;
  const dy = e.clientY - lastMouseY;
  yaw -= dx * mouseSensitivity;
  pitch -= dy * mouseSensitivity;
  pitch = THREE.MathUtils.clamp(pitch, -pitchLimit, pitchLimit);
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});
window.addEventListener('click', onMouseClick);
window.onresize = ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
};
animate();
}

function createStarParticles() {
  const starCount = 1500;
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 150;
  }
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const material = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.4,
    transparent: true,
    opacity: 0.8
  });
  starParticles = new THREE.Points(geometry, material);
  scene.add(starParticles);
}

function createClickableMarker(x,y,z,userData){
  const group = new THREE.Group();
  group.position.set(x,y,z);
  scene.add(group);
  const dotGeo = new THREE.SphereGeometry(0.08,12,12);
  const dotMat = new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.9});
  const dot = new THREE.Mesh(dotGeo,dotMat);
  group.add(dot);
  const ringGeo = new THREE.SphereGeometry(0.25,16,16);
  const ringMat = new THREE.MeshBasicMaterial({color:0x00ccff,transparent:true,opacity:0.3,depthWrite:false});
  const ring = new THREE.Mesh(ringGeo,ringMat);
  group.add(ring);
  group.userData = userData;
  clickableObjects.push(group);
  markers.push({ ring, dot });
}

function onMouseClick(event){
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(clickableObjects, true);
  if(intersects.length > 0){
    curShowObj = intersects[0].object;
    while(curShowObj && !curShowObj.userData?.name){
      curShowObj = curShowObj.parent;
    }
    buildTipHtml(curShowObj.userData);
    floatTip.style.display = 'flex';
  }else{
    curShowObj = null;
    floatTip.style.display = 'none';
  }
}

function buildTipHtml(d){
  let textHtml = `<h4>${d.name}</h4>`;
  for(let k in d){
    if(k !== 'name' && k !== 'img'){
      textHtml += `<p>${k}：${d[k]}</p>`;
    }
  }
  floatTip.innerHTML = `
    <img class="tip-img" src="${d.img}">
    <div class="tip-text">${textHtml}</div>
  `;
}

function updateTipWorldPos(){
  if(!curShowObj) return;
  let wp = curShowObj.position.clone();
  wp.y += 0.2;
  wp.project(camera);
  const x = (wp.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-wp.y * 0.5 + 0.5) * window.innerHeight;
  floatTip.style.left = x+'px';
  floatTip.style.top = y+'px';
  floatTip.style.display = 'flex';
}

function loadObjWithMtl(){
  const mtlLoader = new MTLLoader();
  mtlLoader.setPath('./');
  mtlLoader.load('model.mtl',materials=>{
    materials.preload();
    const objLoader = new OBJLoader();
    objLoader.setMaterials(materials);
    objLoader.load('model.obj',mesh=>{
      mesh.traverse(child=>{
        if(child.isMesh) child.material.side = THREE.DoubleSide;
      });
      mesh.scale.set(1,1,1);
      mesh.position.set(0,0,0);
      scene.add(mesh);
      // 模型加载完成 → 隐藏加载动画
      hideLoader();
    });
  });
}

function animate(){
  requestAnimationFrame(animate);
  if (starParticles) {
    starParticles.rotation.y += 0.0003;
    starParticles.rotation.x += 0.0001;
  }
  const t = Date.now() * 0.0025;
  markers.forEach((m,i)=>{
    const s = 0.9 + Math.sin(t+i*0.5)*0.2;
    m.ring.scale.set(s,s,s);
    m.ring.material.opacity = 0.2 + Math.sin(t+i*0.5)*0.15;
  });
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.normalize();
  const right = new THREE.Vector3();
  right.crossVectors(camera.up,forward).normalize();
  if(keyMap['w']) camera.position.addScaledVector(forward,moveSpeed);
  if(keyMap['s']) camera.position.addScaledVector(forward,-moveSpeed);
  if(keyMap['a']) camera.position.addScaledVector(right,moveSpeed);
  if(keyMap['d']) camera.position.addScaledVector(right,-moveSpeed);
  updateTipWorldPos();
  renderer.render(scene,camera);
}
</script>
</body>
</html>
